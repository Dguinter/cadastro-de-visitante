<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Visitante</title>
    <!-- Importa o CSS externo para estilização -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        // Função JavaScript para habilitar o botão somente quando todos os campos estiverem preenchidos
        function validarCampos() {
            const nome = document.getElementById("nome").value.trim();
            const telefone = document.getElementById("telefone").value.trim();
            const email = document.getElementById("email").value.trim();
            const empresa = document.getElementById("empresa").value.trim();

            // Botão de cadastro
            const botao = document.getElementById("btnCadastrar");

            // Se todos os campos tiverem conteúdo, habilita o botão
            if (nome && telefone && email && empresa) {
                botao.disabled = false;
            } else {
                botao.disabled = true;
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Visitante</h1>

        <!-- Formulário de cadastro de visitante -->
        <!-- O objeto "visitante" é enviado pelo controller -->
        <form th:action="@{/visitantes}" th:object="${visitante}" method="post">
            
            <!-- Campo Nome -->
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" required onkeyup="validarCampos()">

            <!-- Campo Telefone -->
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" th:field="*{telefone}" required onkeyup="validarCampos()">

            <!-- Campo Email -->
            <label for="email">E-mail:</label>
            <input type="email" id="email" th:field="*{email}" required onkeyup="validarCampos()">

            <!-- Campo Empresa -->
            <label for="empresa">Empresa:</label>
            <input type="text" id="empresa" th:field="*{empresa}" required onkeyup="validarCampos()">

            <!-- Botão de cadastro -->
            <!-- Inicialmente desabilitado, só habilita quando todos os campos estão preenchidos -->
            <button type="submit" id="btnCadastrar" disabled>Cadastrar</button>
        </form>

        <!-- Mensagem de confirmação (vinda do controller) -->
        <p th:text="${mensagem}"></p>

        <!-- Botão para voltar ao menu principal -->
        <!-- Este link redireciona para "/" que abre o index.html -->
        <div class="voltar">
            <a th:href="@{/}" class="btn">Voltar ao Menu Principal</a>
        </div>
    </div>
</body>
</html>
